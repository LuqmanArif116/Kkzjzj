<!DOCTYPE html>
<html>
<head>
  <title>Lock App</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 120px;
    }
    input {
      padding: 10px;
      font-size: 18px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 10px;
      background: lime;
      border: none;
      border-radius: 5px;
    }
    #main {
      display: none;
    }
  </style>
</head>
<body>

<h2>Enter Password</h2>

<input type="password" id="pass" placeholder="Password">
<br>
<button onclick="unlock()">Unlock</button>

<p id="msg"></p>

<div id="main">
  <h1>Unlocked 🔓</h1>
</div>

<script>
  const password = "Zx9@Qp7Lm";

  function unlock() {
    var input = document.getElementById("pass").value;

    if(input === password){
      document.getElementById("main").style.display = "block";
      document.getElementById("msg").innerText = "";
    } else {
      document.getElementById("msg").innerText = "Wrong Password ❌";
    }
  }
</script>

</body>
</html>
